# Tesla fleet-telemetry receiver config.
# Reads TLS cert/key from Let's Encrypt (auto-renewed by certbot).
# Records dispatched via the `logger` dispatcher → stdout → captured by
# systemd into /var/log/tesla-telemetry/feed.jsonl, then tailed by
# tesla-telemetry-bridge.service which POSTs to the Rails webhook.

host: 0.0.0.0
port: 4443
log_level: info

tls:
  server_cert: /etc/letsencrypt/live/ardesian.com/fullchain.pem
  server_key:  /etc/letsencrypt/live/ardesian.com/privkey.pem

# Dispatch every record type to the logger. The logger writes JSON to
# stdout; systemd captures it into the feed file.
records:
  alerts:
    - dispatch: logger
  errors:
    - dispatch: logger
  V:
    - dispatch: logger
  connectivity:
    - dispatch: logger
